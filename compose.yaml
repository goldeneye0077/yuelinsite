services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      APP_NAME: ${APP_NAME:-Yuelin Official Site API}
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://yuelin:yuelin_dev@db:5432/yuelin_site}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173","http://localhost:4173","http://127.0.0.1:4173"]}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-development-admin-session-secret}
      ADMIN_SESSION_COOKIE_NAME: ${ADMIN_SESSION_COOKIE_NAME:-yuelin_admin_session}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-12}
      ADMIN_SESSION_COOKIE_SECURE: ${ADMIN_SESSION_COOKIE_SECURE:-false}
      ADMIN_LOGIN_RATE_LIMIT_MAX_REQUESTS: ${ADMIN_LOGIN_RATE_LIMIT_MAX_REQUESTS:-8}
      ADMIN_LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${ADMIN_LOGIN_RATE_LIMIT_WINDOW_SECONDS:-900}
    ports:
      - '${BACKEND_PORT:-8000}:8000'
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yuelin_site}
      POSTGRES_USER: ${POSTGRES_USER:-yuelin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yuelin_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-yuelin} -d ${POSTGRES_DB:-yuelin_site}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  frontend_node_modules:
  postgres_data:
