services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:28000}
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-25173}:8080'
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Yuelin Official Site API}
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://yuelin:yuelin_prod@db:5432/yuelin_site}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:25173","http://127.0.0.1:25173"]}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-["localhost","127.0.0.1"]}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INQUIRY_RATE_LIMIT_MAX_REQUESTS: ${INQUIRY_RATE_LIMIT_MAX_REQUESTS:-5}
      INQUIRY_RATE_LIMIT_WINDOW_SECONDS: ${INQUIRY_RATE_LIMIT_WINDOW_SECONDS:-300}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-development-admin-session-secret}
      ADMIN_SESSION_COOKIE_NAME: ${ADMIN_SESSION_COOKIE_NAME:-yuelin_admin_session}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-12}
      ADMIN_SESSION_COOKIE_SECURE: ${ADMIN_SESSION_COOKIE_SECURE:-false}
      ADMIN_LOGIN_RATE_LIMIT_MAX_REQUESTS: ${ADMIN_LOGIN_RATE_LIMIT_MAX_REQUESTS:-8}
      ADMIN_LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${ADMIN_LOGIN_RATE_LIMIT_WINDOW_SECONDS:-900}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    ports:
      - '${BACKEND_PORT:-28000}:8000'
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/api/health", timeout=5).read()
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yuelin_site}
      POSTGRES_USER: ${POSTGRES_USER:-yuelin_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-yuelin_prod} -d ${POSTGRES_DB:-yuelin_site}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_prod_data:
