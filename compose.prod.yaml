services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-25173}:80'
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Yuelin Official Site API}
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://yuelin:yuelin_prod@db:5432/yuelin_site}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:25173","http://127.0.0.1:25173"]}
    ports:
      - '${BACKEND_PORT:-28000}:8000'
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yuelin_site}
      POSTGRES_USER: ${POSTGRES_USER:-yuelin_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-yuelin_prod} -d ${POSTGRES_DB:-yuelin_site}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_prod_data:
